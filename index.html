<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaren Veto | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --royal: #002366; --fb: #1877f2; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .header-bar { background: #fff; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ddd; direction: ltr; }
        .royal-shield { width: 34px; height: 40px; background: var(--royal); clip-path: polygon(0% 0%, 100% 0%, 100% 75%, 50% 100%, 0% 75%); display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        .shield-z { color: white; font-weight: bold; font-size: 20px; }
        .cover { height: 210px; background: linear-gradient(to bottom, #003399, var(--royal)); }
        .profile { background: #fff; text-align: center; padding-bottom: 25px; }
        .avatar-box { position: relative; width: 165px; height: 165px; margin: -85px auto 0; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; object-fit: cover; background: #ddd; }
        .shield-mini { position: absolute; top: 5px; right: 12px; transform: scale(0.8); z-index: 10; }
        .verify-icon { color: var(--fb); font-size: 20px; margin-right: 5px; }
        .btns { display: flex; gap: 8px; padding: 15px; justify-content: center; }
        .btn { border: none; border-radius: 8px; padding: 10px; font-weight: bold; flex: 1; }
        .btn-blue { background: var(--fb); color: #fff; }
        .btn-gray { background: #e4e6eb; color: #050505; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="royal-shield"><span class="shield-z">Z</span></div>
        <span style="color:var(--royal); font-weight:bold; font-size:20px;">Zaren Veto</span>
    </div>
    <div class="cover"></div>
    <div class="profile">
        <div class="avatar-box">
            <div class="royal-shield shield-mini"><span class="shield-z">Z</span></div>
            <img class="avatar-img" src="https://i.ibb.co/LzfN4S3/profile.jpg">
        </div>
        <h1 style="margin:15px 0 0;">Princess Narzine Bani Hashem <i class="fas fa-certificate verify-icon"></i></h1>
        <p style="color:#65676b;"><b>250K</b> متابع • <b>0</b> متابعة</p>
        <div class="btns">
            <button class="btn btn-blue">متابعة</button>
            <button class="btn btn-gray">مراسلة</button>
        </div>
    </div>
</body>
</html>
