<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaren Veto | Official Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --royal-blue: #002366; --bg: #f0f2f5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* هيدر التطبيق */
        .fb-header { background: #fff; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .app-title { color: var(--royal-blue); font-size: 24px; font-weight: bold; }

        /* منطقة الغلاف التفاعلية */
        .cover-section { height: 230px; background: linear-gradient(135deg, var(--royal-blue), #0055ff); position: relative; cursor: pointer; display: block; }
        .cover-section img { width: 100%; height: 100%; object-fit: cover; }
        .cam-icon-cover { position: absolute; bottom: 12px; left: 12px; background: #e4e6eb; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; color: #050505; }

        /* البروفايل والدرع الملكي */
        .profile-header { background: #fff; padding-bottom: 20px; text-align: center; position: relative; border-bottom: 1px solid #ddd; }
        .avatar-container { position: relative; width: 170px; height: 170px; margin: -85px auto 0; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; background: #ddd; object-fit: cover; display: block; }
        
        /* الدرع الملكي المعلق مع Z الأبيض */
        .royal-shield-badge { 
            position: absolute; top: 10px; right: 10px; width: 48px; height: 48px; 
            background: var(--royal-blue); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 22px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .cam-icon-avatar { position: absolute; bottom: 8px; left: 12px; background: #e4e6eb; width: 34px; height: 34px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; color: #050505; cursor: pointer; }

        /* الاسم والتوثيق المسنن (محمي برمجياً) */
        .name-wrapper { display: flex; align-items: center; justify-content: center; margin-top: 12px; gap: 4px; }
        .profile-name { font-size: 24px; font-weight: bold; color: #050505; margin: 0; line-height: 1; }
        
        /* علامة التوثيق المسننة الأصلية */
        .fb-verified-star { 
            color: var(--fb-blue); 
            font-size: 19px; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .stats { color: #65676b; font-size: 16px; margin-top: 8px; }
        .stats b { color: #050505; }

        /* أزرار تفاعلية */
        .action-btns { display: flex; gap: 8px; padding: 16px; justify-content: center; }
        .btn { border: none; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 15px; flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-blue { background: var(--fb-blue); color: #fff; }
        .btn-gray { background: #e4e6eb; color: #050505; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="fb-header">
        <div class="app-title">Zaren Veto</div>
        <i class="fa-solid fa-magnifying-glass" style="font-size: 20px;"></i>
    </div>

    <label for="upload-cover" class="cover-section">
        <img id="display-cover" src="">
        <div class="cam-icon-cover"><i class="fa-solid fa-camera"></i></div>
    </label>
    <input type="file" id="upload-cover" accept="image/*" onchange="previewImage(event, 'display-cover')">

    <div class="profile-header">
        <div class="avatar-container">
            <div class="royal-shield-badge">Z</div>
            <img id="display-avatar" src="" class="avatar-img">
            
            <label for="upload-avatar" class="cam-icon-avatar"><i class="fa-solid fa-camera"></i></label>
            <input type="file" id="upload-avatar" accept="image/*" onchange="previewImage(event, 'display-avatar')">
        </div>

        <div class="name-wrapper">
            <h1 class="profile-name">Princess Narzine Bani Hashem</h1>
            <span class="fb-verified-star"><i class="fa-solid fa-certificate"></i><i class="fa-solid fa-check" style="position: absolute; font-size: 10px; color: white;"></i></span>
        </div>

        <div class="stats"><b>250K</b> متابع • <b>0</b> متابعة</div>

        <div class="action-btns">
            <button class="btn btn-blue"><i class="fa-solid fa-user-plus"></i> متابعة</button>
            <button class="btn btn-gray"><i class="fa-brands fa-facebook-messenger"></i> مراسلة</button>
        </div>
    </div>

    <script>
        // وظيفة التفاعل الحي لتغيير الصور
        function previewImage(event, elementId) {
            var reader = new FileReader();
            reader.onload = function() {
                var output = document.getElementById(elementId);
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
