<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaren Veto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --royal: #002366; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* شريط علوي تفاعلي */
        .header { background: #fff; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .logo-text { color: var(--royal); font-size: 24px; font-weight: bold; }

        /* الغلاف مع أيقونة كاميرا حقيقية تعمل */
        .cover-container { height: 200px; background: linear-gradient(135deg, var(--royal), #0044cc); position: relative; overflow: hidden; }
        .cover-img { width: 100%; height: 100%; object-fit: cover; }
        .cam-btn-cover { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* صورة الحساب مع الدرع الملكي وكاميرا التغيير */
        .profile-header { background: #fff; padding-bottom: 20px; text-align: center; position: relative; }
        .avatar-wrapper { position: relative; width: 160px; height: 160px; margin: -80px auto 0; }
        .profile-pic { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #fff; background: #ddd; object-fit: cover; }
        
        /* الدرع الملكي مع حرف Z الأبيض (تصميم دقيق) */
        .royal-shield { 
            position: absolute; top: 5px; left: 15px; width: 45px; height: 45px; 
            background: var(--royal); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 20px; z-index: 10;
        }

        /* كاميرا تغيير صورة الحساب */
        .cam-btn-avatar { position: absolute; bottom: 10px; right: 10px; background: #e4e6eb; width: 36px; height: 36px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #050505; }

        /* الاسم والتوثيق الملتصق مباشرة */
        .name-container { margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .user-name { font-size: 24px; font-weight: bold; color: #050505; margin: 0; }
        .verified-badge { color: var(--fb-blue); font-size: 20px; }

        .follower-count { color: #65676b; font-size: 16px; margin-top: 5px; }
        .follower-count b { color: #050505; }

        /* أزرار التفاعل */
        .action-btns { display: flex; justify-content: center; gap: 8px; padding: 15px; }
        .btn-blue { background: var(--fb-blue); color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; flex: 1; max-width: 160px; }
        .btn-gray { background: #e4e6eb; color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; flex: 1; max-width: 160px; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">Zaren Veto</div>
        <div style="display: flex; gap: 15px;"><i class="fas fa-search"></i><i class="fas fa-bars"></i></div>
    </div>

    <div class="cover-container">
        <img id="cover-display" class="cover-img">
        <label for="cover-input" class="cam-btn-cover"><i class="fas fa-camera"></i> تعديل</label>
        <input type="file" id="cover-input" accept="image/*" onchange="updateImage(event, 'cover-display')">
    </div>

    <div class="profile-header">
        <div class="avatar-wrapper">
            <div class="royal-shield">Z</div>
            <img id="avatar-display" class="profile-pic">
            <label for="avatar-input" class="cam-btn-avatar"><i class="fas fa-camera"></i></label>
            <input type="file" id="avatar-input" accept="image/*" onchange="updateImage(event, 'avatar-display')">
        </div>

        <div class="name-container">
            <h1 class="user-name">Princess Narzine Bani Hashem</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>

        <div class="follower-count"><b>250K</b> متابع • <b>0</b> متابعة</div>

        <div class="action-btns">
            <button class="btn-blue"><i class="fas fa-plus"></i> متابعة</button>
            <button class="btn-gray"><i class="fab fa-facebook-messenger"></i> رسالة</button>
        </div>
    </div>

    <script>
        function updateImage(event, displayId) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById(displayId);
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</body>
</html>
