<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAREN VETO - Souveraineté Numérique</title>
    <style>
        /* تعريف الألوان الفضية والرمادية الفخمة */
        :root {
            --bg-black: #000000;
            --bg-dark-grey: #1a1a1a;
            --text-white: #ffffff;
            --text-grey: #a0a0a0;
            --silver-light: #e0e0e0;
            --silver-dark: #b0b0b0;
            --btn-silver: #dcdcdc; /* فضي لامع للأزرار */
            --btn-text: #000000;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            margin: 0;
            padding: 0;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* حاوية اللوكو في المنتصف */
        .logo-container {
            margin-bottom: 40px;
        }

        /* تنسيق اللوكو */
        .logo-container img {
            max-width: 150px; /* يمكنك تكبيرها حسب الرغبة */
            height: auto;
            display: block;
            margin: 0 auto;
            /* إضافة ظل خفيف ليعطي انطباع البريق */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        /* تنسيق النصوص */
        .content {
            max-width: 600px;
            padding: 0 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--silver-light);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            color: var(--text-grey);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* تنسيق الزر الفضي اللامع */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(145deg, var(--silver-light), var(--silver-dark));
            color: var(--btn-text);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #ffffff;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .btn:hover {
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* تنسيق اسم التطبيق في الأسفل */
        .app-name {
            margin-top: 50px;
            color: var(--silver-dark);
            font-size: 16px;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="Zaren Veto Logo">
    </div>

    <div class="content">
        <h1>Bienvenue dans<br>la souveraineté numérique</h1>
        <p>La plateforme qui vous donne le droit de communiquer sans les restrictions de l'identité officielle.</p>

        <a href="#" class="btn">Connectez-vous à l'application</a>

        <div class="app-name">
            Zaren Veto
        </div>
    </div>

</body>
</html>
